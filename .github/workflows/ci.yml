name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.5'   # можно изменить при необходимости

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Lint
        run: gradle lint --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  network-invariant-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Fail if INTERNET permission is requested
        run: |
          if grep -q "android.permission.INTERNET" app/src/main/AndroidManifest.xml; then
            echo "::error::AndroidManifest.xml requests INTERNET permission — this violates the zero-network architectural invariant."
            exit 1
          fi
          echo "OK: no INTERNET permission found."

      - name: Fail if known networking classes are referenced in vault code
        run: |
          if grep -rE "okhttp3\.|retrofit2\.|java\.net\.Socket|HttpURLConnection|ktor\." app/src/main/java/; then
            echo "::error::Networking-related class reference found in source code."
            exit 1
          fi
          echo "OK: no networking classes referenced."